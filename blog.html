<!DOCTYPE html>
<html lang="en">
<head>
    <title>Blog</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        body {
            background-image: url('/assets/common/paper_bg2.jpeg');
        }

        .post-list {
            list-style-position: outside;
            padding-left: 1.4rem;
            margin-left: 0;
        }

        .post-list li {
            margin-bottom: 0.75rem;
        }

        .post-list li::marker {
            font-size: 1.25em;
            color: #333;
        }

        .post-list a,
        .post-list .nav-link {
            text-decoration: none;
            font-family: Candara, Verdana, sans-serif;
            font-size: 1.125rem;
            padding: 0; /* remove Bootstrap nav-link padding */
            margin: 0;
            display: inline; /* keep link inline so date sits closely below */
            line-height: 1;
        }

        .post-date {
            display: block;
            font-size: 0.9rem;
            color: #555;
            margin-left: 0.15rem;
            margin-top: 0rem;
        }

        @media (max-width: 576px) {
            .post-list { padding-left: 1.8rem; }
            .post-list li::marker { font-size: 1.35em; }
            .post-list a, .post-list .nav-link { font-size: 1.05rem; padding: 0; display: inline; }
            .post-date { font-size: 0.85rem; }
        }

        .footer {
            position: absolute;
            bottom: 0;
            width: 80%;
            height: 60px;
            /* Set the fixed height of the footer here */
            /* background-color: #f5f5f5; */
        }

        .row {
            height: 100%;
            justify-content: left;
            display: flex;
            flex-wrap: wrap;
        }

        a {
            text-decoration: none;
            font-family:Candara, Verdana, sans-serif;
        }
        p {
            font-family:Candara, Verdana, sans-serif;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row" style="margin-top: 2%; font-family:Candara, Verdana, sans-serif">
            <p class="fs-4 fw-bold">Blog</p>
        </div>
        <div class="row" style="font-family:Candara, Verdana, sans-serif">
            <ul class="post-list">
                <li>
                    <a class="nav-link" href="/blog/book_reviews.html">Book reviews</a>
                    <span class="post-date">03/2025</span>
                </li>
                <li>
                    <a class="nav-link" href="/blog/llm_thoughts.html">Thoughts on LLM use cases</a>
                    <span class="post-date">10/2024</span>
                </li>
                <li>
                    <a class="nav-link" href="/blog/lasers.html">Lasers</a>
                    <span class="post-date">04/2024</span>
                </li>
            </ul>
        </div>
    </div>
	<!-- Bootstrap JS import -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
