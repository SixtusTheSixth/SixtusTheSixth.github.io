<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            margin: 0;
            background-image: url('/assets/common/paper_bg2.jpeg');
        }
        
        a {
            text-decoration: none;
            font-family:Candara, Verdana, sans-serif;
        }
        p {
            font-family:Candara, Verdana, sans-serif;
        }
        .btn {
            font-family:Candara, Verdana, sans-serif;
        }

        .game-container {
            width: 100%;
            max-width: 960px; /* Wider container so the mode selector can stay on one line */
            padding: 15px;
            text-align: center;
            /* flex-grow: 1; /* Allows it to take up available space */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        @media (min-width: 768px) {
            .game-container {
                max-width: 960px;
            }
        }

        .mode-selector {
            width: 100%;
            display: flex;
            flex-wrap: nowrap;
            justify-content: flex-start;
            overflow-x: auto;
            padding: 0 0 0.25rem 0.25rem;
        }

        .mode-selector .btn {
            white-space: nowrap;
            font-size: 0.8rem;
            padding: 0.375rem 0.55rem;
            flex: 0 0 auto;
            box-shadow: none !important;
        }

        .mode-selector .btn:hover,
        .mode-selector .btn:active,
        .mode-selector .btn:focus,
        .mode-selector .btn:focus-visible,
        .mode-selector .btn-check:focus-visible + .btn {
            box-shadow: none !important;
            outline: none !important;
        }

        .game-board {
            max-width: 400px;
        }

        .game-info {
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.25rem; /* Equivalent to fs-5 in Bootstrap */
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 100%;
            aspect-ratio: 1 / 1; /* Ensures the board is square */
            position: relative;
            box-sizing: border-box; /* Include padding in element's total width and height */
        }

        .board-square {
            width: 100%;
            border-radius: 0 !important; /* Remove border radius for square corners */
            position: relative;
            background-color: transparent;
            border: none; /* Remove default button borders */
            font-size: 4em; /* Large size for X/O */
            font-weight: bold;
            color: inherit; /* Inherit text color */
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s ease-out; /* For the pop effect on hover */
        }

        .board-square:hover:not(:disabled) {
            transform: scale(1.03); /* Slight pop effect on hover */
            background-color: #acb5bd;
        }

        .board-square.btn:disabled, 
        .board-square.btn[disabled] {
            border-color: black !important;
            opacity: 1;
            background-color: transparent;
        }

        /* Black lines for the board */
        .board-square:nth-child(1), .board-square:nth-child(2), .board-square:nth-child(4), .board-square:nth-child(5) {
            border-right: 5px solid black;
            border-bottom: 5px solid black;
        }
        .board-square:nth-child(2), .board-square:nth-child(3), .board-square:nth-child(5), .board-square:nth-child(6) {
            border-left: 5px solid black;
            border-bottom: 5px solid black;
        }
        .board-square:nth-child(4), .board-square:nth-child(5), .board-square:nth-child(7), .board-square:nth-child(8) {
            border-top: 5px solid black;
            border-right: 5px solid black;
        }
        .board-square:nth-child(5), .board-square:nth-child(6), .board-square:nth-child(8), .board-square:nth-child(9) {
            border-top: 5px solid black;
            border-left: 5px solid black;
        }
        
        /* rounded corners when hovering over the corner squares */
        .board-square:nth-child(1) { border-top-left-radius: 5px !important; }
        .board-square:nth-child(3) { border-top-right-radius: 5px !important; }
        .board-square:nth-child(7) { border-bottom-left-radius: 5px !important; }
        .board-square:nth-child(9) { border-bottom-right-radius: 5px !important; }

        .square-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: black;
        }

        .game-info {
            font-family:Candara, Verdana, sans-serif;
        }
        .game-result-info {
            font-weight: bold;
            margin-top: 15px;
            font-size: 1.25rem; /* Equivalent to fs-5 */
            font-family:Candara, Verdana, sans-serif;
        }

        .winning-line {
            position: absolute;
            background-color: red; /* Color of the winning line */
            z-index: 10; /* Ensure it's above the squares */
        }

        /* Specific styles for horizontal, vertical, and diagonal lines */
        .win-row-0 { top: 16.66%; left: 0; width: 100%; height: 5px; }
        .win-row-1 { top: 50%; left: 0; width: 100%; height: 5px; }
        .win-row-2 { top: 83.33%; left: 0; width: 100%; height: 5px; }

        .win-col-0 { top: 0; left: 16.66%; width: 5px; height: 100%; }
        .win-col-1 { top: 0; left: 50%; width: 5px; height: 100%; }
        .win-col-2 { top: 0; left: 83.33%; width: 5px; height: 100%; }

        /* Diagonal lines, top-left to bottom-right and top-right to bottom-left */
        .win-diag-0, .win-diag-1 {
            width: calc(100% * 1.414); /* Approximate diagonal length of a square */
            height: 5px;
            top: 50%;
            left: 50%;
            /* This transform will first move its top-left corner to the center of the board,
            then shift it back by half its own (rotated) width and half its height
            to truly center it before rotation. */
            transform: translate(-50%, -50%) rotate(45deg);
            transform-origin: center center; /* Rotate around its own center */
        }

        .win-diag-1 {
            transform: translate(-50%, -50%) rotate(-45deg); /* Rotate in the opposite direction */
        }
    </style>
</head>
<body>
    <div class="game-container d-flex flex-column align-items-center">
        <div class="row" style="margin-top: 2%; font-family:Candara, Verdana, sans-serif">
            <p class="fs-4 fw-bold">Tic Tac Toe</p>
        </div>
        <div class="mb-3 d-flex flex-column align-items-center">
            <div class="btn-group mb-3 mode-selector" role="group" aria-label="Game Mode Selection">
                <input type="radio" class="btn-check" name="game-mode" id="mode2Players" autocomplete="off" checked>
                <label class="btn btn-outline-primary" for="mode2Players">2 Players</label>

                <input type="radio" class="btn-check" name="game-mode" id="mode1PvRandom" autocomplete="off">
                <label class="btn btn-outline-primary" for="mode1PvRandom">1P vs Random</label>

                <input type="radio" class="btn-check" name="game-mode" id="mode1PvBeatable" autocomplete="off">
                <label class="btn btn-outline-primary" for="mode1PvBeatable">1P vs Beatable AI</label>

                <input type="radio" class="btn-check" name="game-mode" id="mode1PvPerfect" autocomplete="off">
                <label class="btn btn-outline-primary" for="mode1PvPerfect">1P vs Perfect AI</label>

                <input type="radio" class="btn-check" name="game-mode" id="mode1PvMinimax" autocomplete="off">
                <label class="btn btn-outline-primary" for="mode1PvMinimax">1P vs Minimax</label>

                <input type="radio" class="btn-check" name="game-mode" id="mode1PvDQN" autocomplete="off">
                <label class="btn btn-outline-primary" for="mode1PvDQN">1P vs Deep Q-Network</label>
            </div>
            <div id="gameInfo" class="game-info"></div>
        </div>

        <div class="game-board position-relative">
            </div>

        <div id="gameResultInfo" class="game-result-info mt-3" style="display: none;"></div>
        <button id="nextGameBtn" class="btn btn-primary mt-3" style="display: none;">Next Game</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="/games/tictactoe/ttt.js"></script>
</body>
</html>
